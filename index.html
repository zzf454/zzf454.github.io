<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历</title>
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="./mm.css/mm.css">
</head>
<body>
    <div class="resume-container">
        <!-- 简历头部：姓名 + 照片 -->
        <div class="resume-header">
            <div class="name-box">
                <h1>姓名</h1>
            </div>
            <!-- 一寸照片预留位置 -->
            <div class="photo-box">
                <img src="./photo/WIN_20251225_23_03_54_Pro.jpg" alt="一寸照片" class="photo">
            </div>
        </div>

        <!-- 第一部分：基本信息 -->
        <div class="section">
            <h2 class="section-title">基本信息</h2>
            <div class="info-grid">
                <div class="info-item"><span>性别：</span><input type="text"></div>
                <div class="info-item"><span>电话：</span><input type="text"></div>
                <div class="info-item"><span>邮箱：</span><input type="text"></div>
                <div class="info-item"><span>民族：</span><input type="text"></div>
                <div class="info-item"><span>专业：</span><input type="text"></div>
                <div class="info-item"><span>出生年月：</span><input type="text"></div>
                <div class="info-item"><span>毕业时间：</span><input type="text"></div>
                <div class="info-item"><span>政治面貌：</span><input type="text"></div>
                <div class="info-item"><span>毕业院校：</span><input type="text"></div>
            </div>
        </div>

        <!-- 第二部分：教育背景 -->
        <div class="section">
            <h2 class="section-title">教育背景</h2>
            <div class="content-box">
                <p>在这里填写教育背景内容</p>
            </div>
        </div>

        <!-- 第三部分：实践经历 -->
        <div class="section">
            <h2 class="section-title">实践经历</h2>
            <div class="content-box">
                <p>在这里填写实践经历内容</p>
            </div>
        </div>

        <!-- 第四部分：校园经历 -->
        <div class="section">
            <h2 class="section-title">校园经历</h2>
            <div class="content-box">
                <p>在这里填写校园经历内容</p>
            </div>
        </div>

        <!-- 第五部分：技能与自我评价 -->
        <div class="section">
            <h2 class="section-title">技能与自我评价</h2>
            <div class="content-box">
                <p>在这里填写技能与自我评价内容</p>
            </div>
        </div>

        <!-- 视频预留位置 -->
        <div class="section video-section">
            <h2 class="section-title">个人展示视频</h2>
            <div class="video-box">
                <video controls width="100%">
                    <source src="./video/Video_1730888518065.mp4" type="video/mp4">
                    您的浏览器不支持视频播放
                </video>
            </div>
        </div>
    </div>
</body>
</html>
